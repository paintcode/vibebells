# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build and Test Electron, Node, and Python Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v6.2.0
      with:
        python-version: "3.13"
    - name: Install python dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install -r requirements.txt
    - name: Lint python with flake8
      working-directory: ./backend
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test backend with pytest
      working-directory: ./backend
      run: |
        python -m pytest tests/
    - name: Setup Node.js environment
      uses: actions/setup-node@v6.3.0
      with:
        # Version Spec of the version to use. Examples: 12.x, 10.15.1, >=10.15.0.
        node-version: 24.12.0
    - name: Frontend npm install, build and test
      working-directory: ./frontend
      run: |
        npm ci
        npm run build
        npm run test
    
    - name: Desktop npm install
      working-directory: ./desktop
      run: |
        npm ci
    - name: Build desktop app (Windows)
      if: runner.os == 'Windows'
      working-directory: ./desktop
      run: |
        npm run build:win
    - name: Build desktop app (macOS)
      if: runner.os == 'macOS'
      working-directory: ./desktop
      run: |
        npm run build:mac
    - name: Build desktop app (Linux)
      if: runner.os == 'Linux'
      working-directory: ./desktop
      run: |
        npm run build:linux
    - name: E2E test desktop app
      if: runner.os == 'Windows'
      working-directory: ./desktop
      run: |
        npm run test:e2e
    
              
